<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>HabitPulz ER Diagram</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #e8edf5; font-family: Arial, sans-serif; display: flex; flex-direction: column; align-items: center; padding: 24px; }
h2 { color: #1e3a8a; font-size: 20px; margin-bottom: 18px; letter-spacing: 1px; }
.canvas { background: #fff; border: 2px solid #94a3b8; border-radius: 14px; box-shadow: 0 6px 32px #0003; }
/* shapes */
.ent rect  { fill: #bfdbfe; stroke: #1d4ed8; stroke-width: 2.5; }
.ent text  { font-size: 13px; font-weight: bold; fill: #1e3a8a; }
.atr ellipse { fill: #fef9c3; stroke: #b45309; stroke-width: 1.8; }
.atr text    { font-size: 10px; fill: #78350f; }
.pk  ellipse { fill: #fef9c3; stroke: #b45309; stroke-width: 2; }
.pk  text    { font-size: 10px; fill: #78350f; font-weight: bold; text-decoration: underline; }
.rel polygon { fill: #bbf7d0; stroke: #15803d; stroke-width: 2; }
.rel text    { font-size: 11px; font-weight: bold; fill: #14532d; }
.lbl { font-size: 11px; font-weight: bold; fill: #1e40af; }
line { stroke: #475569; stroke-width: 1.6; }
</style>
</head>
<body>
<h2>HabitPulz — Entity Relationship Diagram</h2>
<svg class="canvas" width="900" height="1600" viewBox="0 0 900 1600">

<!-- ╔══════════════════════════════════════════════╗
     ║  ROW 1 — USER entity  (centred at x=450)   ║
     ╚══════════════════════════════════════════════╝ -->

  <rect x="375" y="120" width="150" height="40" rx="5"/>
